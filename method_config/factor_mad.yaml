name: factor_mad
method: factor_mad
params:
  chains_per_cycle: 12
  debate_rounds: 4
  max_correction_rounds: 2
  seed_from_baseline_prob: 0.5
  init_example_count: 2
  history_window: 3
  keep_candidates_per_chain: 1
  min_non_null_ratio: 0.05
  enforce_baseline_diversity: true
  apply_mmr: true

explainability:
  enabled: true
  ast:
    enabled: true
    max_depth: 6
    max_nodes: 20
  semantics:
    enabled: true
    field_semantics_path: explainability/semantics/field_semantics.yaml
    operator_semantics_path: explainability/semantics/operator_semantics.yaml
  scoring:
    enabled: true
    ideal_max_nodes: 10
    ideal_max_depth: 5
    ideal_max_fields: 3
    ideal_max_operators: 5
  mmr:
    use_interpretability_score: true
    filter_by_interpretability: false
    min_interpretability_score: 0.60
    quality_weight: 0.70
    explainability_weight: 0.15
    correlation_weight: 0.10
    complexity_weight: 0.05
  report:
    enabled: true
    save_json: true
    save_markdown: true
