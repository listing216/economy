name: alpha_agent
method: alpha_agent
params:
  ideas_per_cycle: 12
  candidates_per_idea: 1
  example_count: 3
  prefer_top_baselines: true
  max_correction_rounds: 2
  idea_correction_rounds: 1
  max_refine_rounds: 1
  min_non_null_ratio: 0.05
  max_operator_count: 12
  enforce_baseline_diversity: true
  originality_similarity_cap: 0.72
  min_originality_score: 0.25
  min_alignment_score: 0.50
  min_regularized_score: 0.45
  performance_weight: 0.40
  originality_weight: 0.25
  alignment_weight: 0.20
  complexity_weight: 0.15
  ic_scale: 0.05
  ic_ir_scale: 0.50
  long_ret_scale: 0.08
  max_symbolic_length: 28
  max_free_params: 6
  max_features: 5
  max_depth: 7
  apply_mmr: true

explainability:
  enabled: true
  ast:
    enabled: true
    max_depth: 6
    max_nodes: 20
  semantics:
    enabled: true
    field_semantics_path: explainability/semantics/field_semantics.yaml
    operator_semantics_path: explainability/semantics/operator_semantics.yaml
  scoring:
    enabled: true
    ideal_max_nodes: 10
    ideal_max_depth: 5
    ideal_max_fields: 3
    ideal_max_operators: 5
  mmr:
    use_interpretability_score: true
    filter_by_interpretability: false
    min_interpretability_score: 0.60
    quality_weight: 0.70
    explainability_weight: 0.15
    correlation_weight: 0.10
    complexity_weight: 0.05
  report:
    enabled: true
    save_json: true
    save_markdown: true
